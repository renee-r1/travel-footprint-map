<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>旅游足迹地图</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>旅游足迹</h1>
        <p class="lead">
          输入或上传「时间、城市、谁」，地图自动打点；鼠标移到标记上可查看详情。若出现 Failed to fetch，请关闭
          <code>python -m http.server</code>，改用项目目录下运行 <code>./run.sh</code> 或
          <code>python3 server.py</code>（带地理编码代理）。
        </p>

        <form id="add-form" class="form-block" action="#">
          <label for="field-time">时间</label>
          <input id="field-time" name="time" type="text" placeholder="如：2024-07-01 或 暑假" required />

          <label for="field-city">城市</label>
          <input id="field-city" name="city" type="text" placeholder="如：杭州 或 Paris" required />

          <label for="field-who">谁</label>
          <input id="field-who" name="who" type="text" placeholder="如：全家 / 我" required />

          <div class="btn-row">
            <button type="submit" class="btn btn-primary">添加到地图</button>
          </div>
        </form>

        <div class="form-block">
          <label for="csv-file">上传 CSV（表头含：时间,城市,谁）</label>
          <input id="csv-file" type="file" accept=".csv,text/csv" />
          <p class="upload-hint">多行会依次地理编码，约每秒一条，请稍候。</p>
        </div>

        <div class="btn-row">
          <button type="button" id="btn-export" class="btn btn-secondary">导出 CSV</button>
          <button type="button" id="btn-clear" class="btn btn-danger">清空全部</button>
        </div>

        <p id="status" class="status" role="status"></p>

        <div class="trip-list">
          <h2>当前记录</h2>
          <div id="trip-list-body"></div>
        </div>
      </aside>

      <main class="maps-area">
        <div class="maps-split maps-split-single">
          <div class="map-half">
            <h3>地图</h3>
            <div id="map-china"></div>
          </div>
        </div>
        <footer class="attribution-footer">
          地图底图 © OSM / CARTO（Voyager） · 地理编码
          <a href="https://photon.komoot.io/" target="_blank" rel="noopener">Photon</a>
          / Nominatim（演示用，请勿高频批量请求）
        </footer>
      </main>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
